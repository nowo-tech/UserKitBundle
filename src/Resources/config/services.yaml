# User Kit Bundle — service wiring.
services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    Nowo\UserKitBundle\:
        resource: '../../'
        exclude:
            - '../../DependencyInjection/'
            - '../../Model/'
            - '../../NowoUserKitBundle.php'

    Nowo\UserKitBundle\Profile\ProfileRegistry:
        arguments:
            $profiles: '%nowo_user_kit.profiles%'
            $defaultProfileName: '%nowo_user_kit.default_profile%'

    # Blocks authentication when the user account is disabled (security.user_checker).
    Nowo\UserKitBundle\Security\AccountStatusUserChecker:
        tags:
            - { name: security.user_checker }

    # Resolves whether a user is currently online from lastActivityAt.
    Nowo\UserKitBundle\Presence\UserPresenceResolver: ~

    # Updates lastActivityAt on authenticated requests (throttled).
    Nowo\UserKitBundle\EventSubscriber\LastActivitySubscriber: ~

    # Optional: invalidates sessions when enabled is set to false on postUpdate.
    Nowo\UserKitBundle\EventListener\AccountDisabledListener:
        tags:
            - { name: doctrine.orm.entity_listener, event: postUpdate, entity: null, lazy: true, method: postUpdate }

    Nowo\UserKitBundle\Session\SessionInvalidatorInterface:
        alias: Nowo\UserKitBundle\Session\DefaultSessionInvalidator

    Nowo\UserKitBundle\Session\DefaultSessionInvalidator: ~
