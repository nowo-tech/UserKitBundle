name: user-kit-demo-symfony8-php85

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: user-kit-demo-symfony8-php85-php
    working_dir: /app
    ports:
      - "${PORT:-8024}:80"
    volumes:
      - .:/app
      - ../..:/var/user-kit-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=${APP_SECRET:-demo-secret}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    networks:
      - user-kit-demo-network

volumes:
  composer-cache:

networks:
  user-kit-demo-network:
    driver: bridge
